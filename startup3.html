<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        section {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        .heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
        }

        h1 {
            font-family: "DM Sans";
            font-weight: 700;
            font-size: 24px;
            line-height: 100%;
            letter-spacing: -0.29px;
            text-align: center;
            color: #1E0E62;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        a {
            text-decoration: none;
            font-family: "DM Sans";
            font-weight: 500;
            font-size: 18px;
            line-height: 26px;
        }

        button {
            border: none;
            background-color: #25DAC5;
            padding: 10px 20px;
            border-radius: 100px;
            font-family: "DM Sans";
            font-weight: 500;
            font-size: 18px;
            line-height: 26px;
            letter-spacing: 0px;
            text-align: center;
            vertical-align: middle;
            color: #FFFFFF;

        }

        .para {
            width: 600px;
            height: 156px;
            font-family: DM Sans;
            font-weight: 700;
            font-size: 42px;
            line-height: 52px;
            letter-spacing: -0.4px;
            color: #1E0E62;
        }

        .box {
            display: flex;
            gap: 100px;
            justify-content: space-between;
            width: 100%;

        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 17px;
            max-width: 450px;
            height:283px;
        }

        .form input[type="email"] {
            margin-top: 13px;
            /* 17px फॉर्म का डिफ़ॉल्ट + 13px = 30px का कुल गैप बनेगा */
        }

        .form input[type="password"] {
            margin-top: 13px;
            
        }

        .form button {
            margin-top: 13px;
        }



        .input {
            width: 100%;
            padding: 15px 25px;
            border: 2px solid #EBEAED;
            border-radius: 100px;
            outline: none;
            font-size: 18px;
        }

        .input::placeholder {
            font-family: "DM Sans";
            font-weight: 500;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 0px;
            vertical-align: middle;
            color: rgba(21, 20, 57, 0.4);
        }

        .para2 {
            font-family: "DM Sans";
            font-weight: 400;
            font-size: 16px;
            line-height: 26px;
            text-align: center;
            color: rgba(21, 20, 57, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .btn {
            width: 100%;
            padding: 15px;
        }


        img {
            width: 100%;
            min-width: 550px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .para3 {
            height: 48px;
            font-family: DM Sans;
            font-weight: 500;
            font-size: 18px;
            leading-trim: NONE;
            line-height: 28px;
            letter-spacing: 0px;
            color: rgba(21, 20, 57, 0.4);
        }

        .box2 {
            display: flex;
            flex-direction: column;
            gap: 77px;
        }

        .video {
            width: 470px;
            height: 381px;
            border-radius: 10px;
            margin-left: auto;
        }

        .videos{
            width: 470px;
            height: 265px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <section>
        <div class="container">
            <div class="heading">
                <h1>Startup 3</h1>
                <div class="nav">
                    <a href="#">API</a>
                    <a href="#">Help</a>
                    <a href="#">Login</a>
                    <button>Sign Up</button>
                </div>
            </div>
            <div class="box">
                <div class="box2">
                    <div class="para">
                        <p>A high-quality solution for those who want a beautiful startup website quickly</p>
                    </div>
                    <div class="form">
                        <input type="email" placeholder="Your email" class="input" />
                        <input type="password" placeholder="Your password" class="input" />
                        <button class="btn">Sign in</button>
                        <p class="para2">By signing up, you agree to the Terms of Service</p>
                    </div>
                </div>
                <div class="video">
                    <iframe class="videos" src="https://www.youtube.com/embed/QKxrqUBxwUE"
                        title="Can a cracked filling be repaired How do you fix a loose filling? - Dr. Suresh S"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                    <p class="para3">We made it so beutiful and simple. It combines landings, pages, blogs and shop
                        screens. It is definitely the tool you need in your collection! </p>
                </div>
            </div>

        </div>
    </section>

</body>

</html>
